<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Proof Chain...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f9f9f9;
      color: #1a1a1a;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #666; }
  </style>
  <script>
    // Pass query params through to the app via custom scheme fallback
    const params = window.location.search;
    window.location.replace("proof-visit://auth/callback" + params);
  </script>
</head>
<body>
  <div class="container">
    <h1>Redirecting to Proof Chain…</h1>
    <p>If the app doesn't open, please return to it manually.</p>
  </div>
</body>
</html>
